<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <title>📸 StudyHub Gallery</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: 0 auto;
}

header {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 15px;
}

h1 {
    color: #333;
    font-size: 2em;
}

.user-section {
    display: flex;
    gap: 15px;
    align-items: center;
}

.user-name {
    background: #f9f9f9;
    padding: 8px 15px;
    border-radius: 20px;
    color: #333;
    font-weight: bold;
}

.btn-logout {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
}

.btn-logout:hover {
    background: #c0392b;
}

.login-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.login-modal.active {
    display: flex;
}

.login-content {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
}

.login-content h2 {
    margin-bottom: 20px;
    color: #333;
}

.login-content input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 1em;
}

.login-content button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1em;
}

.login-content button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.upload-section {
    background: white;
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.upload-section h2 {
    color: #333;
    margin-bottom: 20px;
    font-size: 1.5em;
}

.upload-buttons {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
}

.btn-upload-option {
    padding: 15px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1em;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

.btn-upload-option:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.btn-upload-option span {
    font-size: 1.8em;
}

input[type="file"], textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 1em;
    font-family: Arial, sans-serif;
    margin-bottom: 12px;
}

input[type="file"] {
    padding: 8px;
}

textarea:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
}

textarea {
    min-height: 80px;
    resize: vertical;
}

.image-preview {
    margin: 15px 0;
    display: none;
    border-radius: 8px;
    overflow: hidden;
    max-height: 300px;
}

.image-preview img, .image-preview video {
    width: 100%;
    max-height: 300px;
    object-fit: cover;
}

.btn-upload {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1.05em;
}

.btn-upload:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

@media (max-width: 600px) {
    .gallery {
        grid-template-columns: 1fr;
    }
}

.post {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: all 0.3s;
}

.post:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.post-image, .post-video {
    width: 100%;
    height: 250px;
    object-fit: cover;
    background: #f0f0f0;
    display: block;
}

.post-content {
    padding: 15px;
}

.post-author {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.post-author-name {
    font-weight: bold;
    color: #333;
    font-size: 1em;
}

.post-date {
    font-size: 0.75em;
    color: #999;
}

.post-caption {
    color: #666;
    font-size: 0.95em;
    line-height: 1.5;
    margin-bottom: 12px;
    word-break: break-word;
}

.post-actions {
    display: flex;
    gap: 8px;
}

.btn-like {
    flex: 1;
    padding: 8px;
    background: #f0f0f0;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn-like:hover {
    background: #e74c3c;
    color: white;
}

.btn-like.liked {
    background: #e74c3c;
    color: white;
}

.btn-delete {
    flex: 1;
    padding: 8px;
    background: #f0f0f0;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn-delete:hover {
    background: #e74c3c;
    color: white;
}

.empty-state {
    text-align: center;
    background: white;
    padding: 60px 20px;
    border-radius: 15px;
    color: #999;
}

.empty-state-icon {
    font-size: 4em;
    margin-bottom: 15px;
}

.sync-indicator {
    text-align: center;
    color: white;
    font-size: 0.9em;
    margin-top: 20px;
}

.sync-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #2ecc71;
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

#cameraInput, #fileInput, #galleryInput {
    display: none;
}

@media (max-width: 600px) {
    header {
        flex-direction: column;
        text-align: center;
    }
    h1 {
        font-size: 1.5em;
    }
    .user-section {
        flex-direction: column;
        width: 100%;
    }
    .upload-section {
        padding: 15px;
    }
    .upload-buttons {
        grid-template-columns: 1fr;
    }
}
    </style>
</head>
<body>
    <div id="loginModal" class="login-modal active">
        <div class="login-content">
            <h2>📸 StudyHub Gallery</h2>
            <p style="margin-bottom: 20px; color: #666;">Teile Fotos & Videos mit der Klasse!</p>
            <input type="text" id="usernameInput" placeholder="Benutzername" onkeypress="if(event.key==='Enter') login()">
            <button onclick="login()">Anmelden 🎬</button>
        </div>
    </div>

    <div id="appContainer" style="display: none;">
        <header>
            <h1>📸 StudyHub Gallery</h1>
            <div class="user-section">
                <div class="user-name">👤 <span id="currentUserDisplay"></span></div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </header>

        <div class="upload-section">
            <h2>📤 Foto/Video hochladen</h2>
            <div class="upload-buttons">
                <button class="btn-upload-option" onclick="openCamera()">
                    <span>📷</span>
                    Foto machen
                </button>
                <button class="btn-upload-option" onclick="openVideo()">
                    <span>🎥</span>
                    Video aufnehmen
                </button>
                <button class="btn-upload-option" onclick="openGallery()">
                    <span>🖼️</span>
                    Galerie
                </button>
                <button class="btn-upload-option" onclick="openFiles()">
                    <span>📁</span>
                    Dateien
                </button>
            </div>

            <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handleCapture('camera')">
            <input type="file" id="videoInput" accept="video/*" capture="environment" onchange="handleCapture('video')">
            <input type="file" id="galleryInput" accept="image/*,video/*" onchange="handleCapture('gallery')">
            <input type="file" id="fileInput" accept="image/*,video/*" onchange="handleCapture('file')">

            <div class="image-preview" id="preview"></div>
            <textarea id="captionInput" placeholder="Bildunterschrift (Optional)"></textarea>
            <button class="btn-upload" onclick="uploadMedia()">📤 Hochladen</button>
        </div>

        <div id="galleryContainer" class="gallery"></div>

        <div class="sync-indicator">
            <span class="sync-dot"></span> Live Sync aktiv
        </div>
    </div>

    <script>
        let posts = [];
        let currentUser = null;
        let currentMediaData = null;
        let currentMediaType = null;

        // Login
        function login() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('Benutzername eingeben!');
                return;
            }
            currentUser = username;
            localStorage.setItem('gallery_user', username);
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('currentUserDisplay').textContent = username;
            loadPosts();
        }

        // Logout
        function logout() {
            currentUser = null;
            localStorage.removeItem('gallery_user');
            location.reload();
        }

        // Kamera öffnen
        function openCamera() {
            document.getElementById('cameraInput').click();
        }

        // Video öffnen
        function openVideo() {
            document.getElementById('videoInput').click();
        }

        // Galerie öffnen
        function openGallery() {
            document.getElementById('galleryInput').click();
        }

        // Dateien öffnen
        function openFiles() {
            document.getElementById('fileInput').click();
        }

        // Media capture
        function handleCapture(type) {
            let inputId = '';
            if (type === 'camera') inputId = 'cameraInput';
            if (type === 'video') inputId = 'videoInput';
            if (type === 'gallery') inputId = 'galleryInput';
            if (type === 'file') inputId = 'fileInput';

            const file = document.getElementById(inputId).files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    currentMediaData = e.target.result;
                    currentMediaType = file.type.startsWith('video') ? 'video' : 'image';
                    previewMedia();
                };
                reader.readAsDataURL(file);
            }
        }

        // Media Preview
        function previewMedia() {
            const preview = document.getElementById('preview');
            if (currentMediaType === 'video') {
                preview.innerHTML = `<video src="${currentMediaData}" controls style="width: 100%;"></video>`;
            } else {
                preview.innerHTML = `<img src="${currentMediaData}">`;
            }
            preview.style.display = 'block';
        }

        // Posts laden
        function loadPosts() {
            const saved = localStorage.getItem('gallery_posts');
            if (saved) {
                posts = JSON.parse(saved);
            }
            renderGallery();
        }

        // Posts speichern
        function savePosts() {
            localStorage.setItem('gallery_posts', JSON.stringify(posts));
        }

        // Media hochladen
        function uploadMedia() {
            const caption = document.getElementById('captionInput').value.trim();

            if (!currentMediaData) {
                alert('Foto oder Video auswählen!');
                return;
            }

            const post = {
                id: Date.now(),
                author: currentUser,
                media: currentMediaData,
                mediaType: currentMediaType,
                caption: caption,
                likes: 0,
                liked: false,
                date: new Date().toLocaleString('de-DE', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };

            posts.unshift(post);
            savePosts();
            
            // Reset
            currentMediaData = null;
            currentMediaType = null;
            document.getElementById('cameraInput').value = '';
            document.getElementById('videoInput').value = '';
            document.getElementById('galleryInput').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('captionInput').value = '';
            document.getElementById('preview').style.display = 'none';
            
            renderGallery();
            alert('✅ ' + (currentMediaType === 'video' ? 'Video' : 'Foto') + ' hochgeladen!');
        }

        // Media liken
        function toggleLike(id) {
            const post = posts.find(p => p.id === id);
            if (post) {
                if (post.liked) {
                    post.likes--;
                    post.liked = false;
                } else {
                    post.likes++;
                    post.liked = true;
                }
                savePosts();
                renderGallery();
            }
        }

        // Media löschen
        function deletePost(id) {
            if (confirm('Wirklich löschen?')) {
                posts = posts.filter(p => p.id !== id);
                savePosts();
                renderGallery();
            }
        }

        // Galerie rendern
        function renderGallery() {
            const container = document.getElementById('galleryContainer');

            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">📭</div>
                        <p>Noch keine Fotos/Videos hochgeladen.</p>
                        <p>Sei der Erste! 📸</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="post">
                    ${post.mediaType === 'video' 
                        ? `<video src="${post.media}" class="post-video" controls></video>`
                        : `<img src="${post.media}" class="post-image" alt="Post">`
                    }
                    <div class="post-content">
                        <div class="post-author">
                            <span class="post-author-name">👤 ${escapeHtml(post.author)}</span>
                            <span class="post-date">📅 ${post.date}</span>
                        </div>
                        ${post.caption ? `<p class="post-caption">"${escapeHtml(post.caption)}"</p>` : ''}
                        <div class="post-actions">
                            <button class="btn-like ${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id})">❤️ ${post.likes}</button>
                            ${post.author === currentUser ? `<button class="btn-delete" onclick="deletePost(${post.id})">🗑️</button>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // HTML escapen
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Auto-Refresh
        setInterval(() => {
            if (currentUser) {
                loadPosts();
            }
        }, 3000);

        // Beim Laden
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('gallery_user');
            if (saved) {
                currentUser = saved;
                document.getElementById('usernameInput').value = saved;
                document.getElementById('loginModal').classList.remove('active');
                document.getElementById('appContainer').style.display = 'block';
                document.getElementById('currentUserDisplay').textContent = saved;
                loadPosts();
            }
        });
    </script>
</body>
</html>
