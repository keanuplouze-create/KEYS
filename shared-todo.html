<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <title>📋 Shared To-Do List</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 700px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
h1 { color: #333; text-align: center; margin-bottom: 10px; font-size: 2.2em; }
.subtitle { text-align: center; color: #999; margin-bottom: 20px; }
.user-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.user-name { font-weight: bold; color: #333; font-size: 1.1em; }
.btn-logout { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
.btn-logout:hover { background: #c0392b; }
.input-group { display: flex; gap: 10px; margin-bottom: 20px; }
input[type="text"], textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; }
input[type="text"]:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 10px rgba(102, 126, 234, 0.2); }
textarea { min-height: 70px; margin-bottom: 10px; }
.btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; text-align: center; }
.stat-number { font-size: 1.8em; font-weight: bold; color: #667eea; }
.stat-label { font-size: 0.9em; color: #666; }
.controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.btn-control { flex: 1; min-width: 80px; padding: 10px; border: 2px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-control:hover { border-color: #667eea; color: #667eea; }
.btn-control.active { background: #667eea; color: white; border-color: #667eea; }
.todo-list { max-height: 500px; overflow-y: auto; }
.todo-item { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #667eea; display: flex; align-items: center; gap: 12px; }
.todo-item.completed { opacity: 0.6; border-left-color: #27ae60; }
.todo-item.completed .todo-text { text-decoration: line-through; color: #999; }
input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; accent-color: #667eea; }
.todo-content { flex: 1; }
.todo-text { color: #333; margin-bottom: 5px; }
.todo-meta { font-size: 0.8em; color: #999; }
.btn-delete { background: #e74c3c; color: white; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
.btn-delete:hover { background: #c0392b; }
.empty { text-align: center; color: #999; padding: 40px; }
.loading { text-align: center; color: #667eea; font-weight: bold; }
.sync-indicator { text-align: center; font-size: 0.85em; color: #999; margin-top: 15px; }
.sync-dot { display: inline-block; width: 8px; height: 8px; background: #27ae60; border-radius: 50%; margin-right: 5px; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.login-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
.login-modal.active { display: flex; }
.login-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; }
.login-content h2 { margin-bottom: 20px; }
.login-content input { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; }
.login-content button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loginModal" class="login-modal active">
        <div class="login-content">
            <h2>📋 Shared To-Do</h2>
            <input type="text" id="usernameInput" placeholder="Benutzername" onkeypress="if(event.key==='Enter') login()">
            <button onclick="login()">Anmelden</button>
        </div>
    </div>

    <div class="container" id="appContainer" style="display: none;">
        <h1>📋 Shared To-Do List</h1>
        <p class="subtitle">Alle sehen die gleiche Liste in ECHTZEIT! 🔄</p>

        <div class="user-section">
            <span class="user-name">👤 <span id="currentUserDisplay"></span></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Neue Aufgabe..." onkeypress="if(event.key==='Enter') addTodo()">
            <button class="btn" onclick="addTodo()">➕ Add</button>
        </div>

        <div class="stats">
            <div>
                <div class="stat-number" id="totalCount">0</div>
                <div class="stat-label">Gesamt</div>
            </div>
            <div>
                <div class="stat-number" id="activeCount">0</div>
                <div class="stat-label">Aktiv</div>
            </div>
            <div>
                <div class="stat-number" id="completedCount">0</div>
                <div class="stat-label">Erledigt</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-control active" onclick="filterTodos('all')" id="filterAll">Alle</button>
            <button class="btn-control" onclick="filterTodos('active')" id="filterActive">Aktiv</button>
            <button class="btn-control" onclick="filterTodos('completed')" id="filterCompleted">✅ Erledigt</button>
            <button class="btn-control" onclick="clearCompleted()">🗑️ Leeren</button>
        </div>

        <div class="todo-list" id="todoList"></div>

        <div class="sync-indicator">
            <span class="sync-dot"></span> Live Sync aktiv
        </div>
    </div>

    <script>
        const SYNC_INTERVAL = 1000; // Alle 1 Sekunde synchronisieren!
        let todos = [];
        let currentUser = null;
        let currentFilter = 'all';

        function login() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) { alert('Benutzername eingeben!'); return; }
            currentUser = username;
            localStorage.setItem('shared_todo_user', username);
            showApp();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('shared_todo_user');
            location.reload();
        }

        function showApp() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('currentUserDisplay').textContent = currentUser;
            loadTodos();
        }

        function loadTodos() {
            const saved = localStorage.getItem('SHARED_TODOS_GLOBAL');
            if (saved) {
                try {
                    todos = JSON.parse(saved);
                } catch (e) {
                    todos = [];
                }
            }
            renderTodos();
            updateStats();
        }

        function saveTodos() {
            localStorage.setItem('SHARED_TODOS_GLOBAL', JSON.stringify(todos));
        }

        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) { alert('Aufgabe eingeben!'); return; }

            const todo = {
                id: Date.now(),
                author: currentUser,
                title: text,
                completed: false,
                date: new Date().toLocaleString('de-DE', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
            };

            todos.unshift(todo);
            saveTodos();
            input.value = '';
            renderTodos();
            updateStats();
        }

        function deleteTodo(id) {
            if (confirm('Wirklich löschen?')) {
                todos = todos.filter(t => t.id !== id);
                saveTodos();
                renderTodos();
                updateStats();
            }
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
                updateStats();
            }
        }

        function filterTodos(filter) {
            currentFilter = filter;
            document.querySelectorAll('.btn-control:not(:last-child)').forEach(btn => btn.classList.remove('active'));
            
            if (filter === 'all') document.getElementById('filterAll').classList.add('active');
            else if (filter === 'active') document.getElementById('filterActive').classList.add('active');
            else if (filter === 'completed') document.getElementById('filterCompleted').classList.add('active');
            
            renderTodos();
        }

        function clearCompleted() {
            if (confirm('Alle erledigten Aufgaben löschen?')) {
                todos = todos.filter(t => !t.completed);
                saveTodos();
                renderTodos();
                updateStats();
            }
        }

        function renderTodos() {
            const list = document.getElementById('todoList');
            
            let filtered = todos;
            if (currentFilter === 'active') filtered = todos.filter(t => !t.completed);
            else if (currentFilter === 'completed') filtered = todos.filter(t => t.completed);

            if (filtered.length === 0) {
                list.innerHTML = '<p class="empty">Keine Aufgaben ' + (currentFilter === 'completed' ? '✨' : currentFilter === 'active' ? '📝' : '📭') + '</p>';
                return;
            }

            list.innerHTML = filtered.map(t => `
                <div class="todo-item ${t.completed ? 'completed' : ''}">
                    <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTodo(${t.id})">
                    <div class="todo-content">
                        <div class="todo-text">${escapeHtml(t.title)}</div>
                        <div class="todo-meta">👤 ${escapeHtml(t.author)} • ${t.date}</div>
                    </div>
                    ${t.author === currentUser ? `<button class="btn-delete" onclick="deleteTodo(${t.id})">🗑️</button>` : ''}
                </div>
            `).join('');
        }

        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const active = total - completed;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('activeCount').textContent = active;
            document.getElementById('completedCount').textContent = completed;
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // WICHTIG: Alle 1 Sekunde syncen!
        setInterval(() => {
            if (currentUser) {
                loadTodos();
            }
        }, SYNC_INTERVAL);

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('shared_todo_user');
            if (saved) {
                currentUser = saved;
                showApp();
            }
        });
    </script>
</body>
</html>
