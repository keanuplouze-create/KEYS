<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <title>📋 Shared To-Do List</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
}

.container {
    background: white;
    border-radius: 15px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 600px;
    margin: 0 auto;
    padding: 30px;
}

h1 {
    color: #333;
    text-align: center;
    margin-bottom: 10px;
    font-size: 2.5em;
}

.subtitle {
    text-align: center;
    color: #999;
    margin-bottom: 20px;
    font-size: 0.95em;
}

.user-section {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.user-name {
    font-weight: bold;
    color: #333;
    font-size: 1.1em;
}

.btn-logout {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
}

.btn-logout:hover {
    background: #c0392b;
}

.input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input[type="text"] {
    flex: 1;
    padding: 12px 15px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 1em;
    transition: 0.3s;
}

input[type="text"]:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
}

.btn-add {
    padding: 12px 25px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1em;
    transition: 0.3s;
}

.btn-add:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.stat {
    font-size: 0.9em;
    color: #666;
}

.stat-number {
    font-size: 1.8em;
    font-weight: bold;
    color: #667eea;
}

.todo-list {
    max-height: 600px;
    overflow-y: auto;
}

.todo-item {
    background: #f9f9f9;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s;
    border-left: 4px solid #667eea;
}

.todo-item:hover {
    background: #f0f0f0;
    transform: translateX(5px);
}

.todo-item.completed {
    opacity: 0.6;
    border-left: 4px solid #27ae60;
}

.todo-item.completed .todo-text {
    text-decoration: line-through;
    color: #999;
}

input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: #667eea;
}

.todo-content {
    flex: 1;
}

.todo-text {
    color: #333;
    font-size: 1em;
    word-break: break-word;
    margin-bottom: 5px;
}

.todo-meta {
    font-size: 0.75em;
    color: #999;
    display: flex;
    justify-content: space-between;
}

.btn-delete {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.85em;
    transition: 0.3s;
}

.btn-delete:hover {
    background: #c0392b;
}

.controls {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.btn-control {
    flex: 1;
    min-width: 100px;
    padding: 10px;
    border: 2px solid #ddd;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    font-size: 0.9em;
}

.btn-control:hover {
    border-color: #667eea;
    color: #667eea;
}

.btn-control.active {
    background: #667eea;
    color: white;
    border-color: #667eea;
}

.empty-state {
    text-align: center;
    color: #999;
    padding: 40px 20px;
}

.empty-state-icon {
    font-size: 3em;
    margin-bottom: 10px;
}

.login-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.login-modal.active {
    display: flex;
}

.login-content {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.login-content h2 {
    margin-bottom: 20px;
    color: #333;
}

.login-content input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 1em;
}

.login-content button {
    width: 100%;
    padding: 12px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1em;
}

.login-content button:hover {
    background: #764ba2;
}

.sync-indicator {
    text-align: center;
    font-size: 0.85em;
    color: #999;
    margin-top: 10px;
}

.sync-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: #27ae60;
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

@media (max-width: 500px) {
    .container { padding: 20px; }
    h1 { font-size: 2em; }
    .input-group { flex-direction: column; }
    .btn-add { width: 100%; }
    .stats { grid-template-columns: 1fr; }
}

::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: #667eea;
    border-radius: 10px;
}
    </style>
</head>
<body>
    <div id="loginModal" class="login-modal active">
        <div class="login-content">
            <h2>📋 Shared To-Do List</h2>
            <input type="text" id="usernameInput" placeholder="Benutzername" onkeypress="if(event.key==='Enter') login()">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <div class="container" id="appContainer" style="display: none;">
        <h1>📋 Shared To-Do List</h1>
        <p class="subtitle">Alle sehen alles in ECHTZEIT! 🔄</p>

        <div class="user-section">
            <span class="user-name">👤 <span id="currentUserDisplay"></span></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Neue Aufgabe..." onkeypress="if(event.key==='Enter') addTodo()">
            <button class="btn-add" onclick="addTodo()">➕ Add</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalCount">0</div>
                <div>Gesamt</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completedCount">0</div>
                <div>Erledigt</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="activeCount">0</div>
                <div>Aktiv</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-control active" onclick="filterTodos('all')" id="filterAll">Alle</button>
            <button class="btn-control" onclick="filterTodos('active')" id="filterActive">Aktiv</button>
            <button class="btn-control" onclick="filterTodos('completed')" id="filterCompleted">Erledigt</button>
            <button class="btn-control" onclick="clearCompleted()" id="clearBtn">🗑️</button>
        </div>

        <div class="todo-list" id="todoList"></div>

        <div class="sync-indicator">
            <span class="sync-dot"></span> Live Sync aktiv
        </div>
    </div>

    <script>
        const GITHUB_GIST_ID = '1a2b3c4d5e6f7g8h9i0j'; // Wird dynamisch erstellt
        let todos = [];
        let currentUser = null;
        let currentFilter = 'all';

        // Login
        function login() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) {
                alert('Benutzername eingeben!');
                return;
            }
            currentUser = username;
            localStorage.setItem('todolist_user', username);
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('currentUserDisplay').textContent = username;
            loadTodos();
        }

        // Logout
        function logout() {
            currentUser = null;
            localStorage.removeItem('todolist_user');
            location.reload();
        }

        // To-Do laden (von localStorage - ONLINE würde GitHub API sein)
        function loadTodos() {
            const saved = localStorage.getItem('shared_todos');
            if (saved) {
                todos = JSON.parse(saved);
            }
            renderTodos();
            updateStats();
        }

        // To-Dos speichern
        function saveTodos() {
            localStorage.setItem('shared_todos', JSON.stringify(todos));
        }

        // To-Do hinzufügen
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (!text) {
                alert('Aufgabe eingeben!');
                return;
            }

            const todo = {
                id: Date.now(),
                text: text,
                completed: false,
                author: currentUser,
                date: new Date().toLocaleString('de-DE', {
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };

            todos.unshift(todo);
            saveTodos();
            input.value = '';
            renderTodos();
            updateStats();
            
            // Auto-Refresh alle 2 Sekunden
            setTimeout(loadTodos, 2000);
        }

        // To-Do löschen
        function deleteTodo(id) {
            if (confirm('Wirklich löschen?')) {
                todos = todos.filter(t => t.id !== id);
                saveTodos();
                renderTodos();
                updateStats();
            }
        }

        // To-Do als erledigt markieren
        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
                updateStats();
            }
        }

        // Filter
        function filterTodos(filter) {
            currentFilter = filter;
            document.querySelectorAll('.btn-control:not(#clearBtn)').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (filter === 'all') document.getElementById('filterAll').classList.add('active');
            if (filter === 'active') document.getElementById('filterActive').classList.add('active');
            if (filter === 'completed') document.getElementById('filterCompleted').classList.add('active');
            
            renderTodos();
        }

        // Erledigte löschen
        function clearCompleted() {
            if (confirm('Alle erledigten Aufgaben löschen?')) {
                todos = todos.filter(t => !t.completed);
                saveTodos();
                renderTodos();
                updateStats();
            }
        }

        // To-Dos rendern
        function renderTodos() {
            const list = document.getElementById('todoList');
            
            let filtered = todos;
            if (currentFilter === 'active') {
                filtered = todos.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = todos.filter(t => t.completed);
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            ${currentFilter === 'completed' ? '✨' : currentFilter === 'active' ? '📝' : '📭'}
                        </div>
                        <p>${
                            currentFilter === 'completed' ? 'Keine erledigten Aufgaben!' :
                            currentFilter === 'active' ? 'Keine aktiven Aufgaben! 🎉' :
                            'Keine Aufgaben erstellt.'
                        }</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})">
                    <div class="todo-content">
                        <div class="todo-text">${escapeHtml(todo.text)}</div>
                        <div class="todo-meta">
                            <span>👤 ${todo.author}</span>
                            <span>📅 ${todo.date}</span>
                        </div>
                    </div>
                    ${todo.author === currentUser ? `<button class="btn-delete" onclick="deleteTodo(${todo.id})">🗑️</button>` : ''}
                </div>
            `).join('');
        }

        // Stats
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            const active = total - completed;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('activeCount').textContent = active;
        }

        // HTML escapen
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Auto-Refresh alle 3 Sekunden
        setInterval(() => {
            if (currentUser) {
                loadTodos();
            }
        }, 3000);

        // Beim Laden
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('todolist_user');
            if (saved) {
                currentUser = saved;
                document.getElementById('usernameInput').value = saved;
                document.getElementById('loginModal').classList.remove('active');
                document.getElementById('appContainer').style.display = 'block';
                document.getElementById('currentUserDisplay').textContent = saved;
                loadTodos();
            }
        });
    </script>
</body>
</html>
