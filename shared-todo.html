<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 Shared To-Do List - REAL CLOUD</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 700px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
h1 { color: #333; text-align: center; margin-bottom: 10px; font-size: 2.2em; }
.subtitle { text-align: center; color: #999; margin-bottom: 20px; font-size: 0.95em; }
.user-section { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
.user-name { font-weight: bold; color: #333; font-size: 1.1em; }
.btn-logout { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-weight: bold; }
.btn-logout:hover { background: #c0392b; }
.input-group { display: flex; gap: 10px; margin-bottom: 20px; }
input[type="text"] { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; }
input[type="text"]:focus { outline: none; border-color: #667eea; box-shadow: 0 0 10px rgba(102, 126, 234, 0.3); }
.btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn:hover { transform: translateY(-2px); }
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #f9f9f9; padding: 15px; border-radius: 8px; text-align: center; }
.stat-number { font-size: 1.8em; font-weight: bold; color: #667eea; }
.controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.btn-control { flex: 1; min-width: 80px; padding: 10px; border: 2px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
.btn-control.active { background: #667eea; color: white; border-color: #667eea; }
.todo-list { max-height: 500px; overflow-y: auto; }
.todo-item { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #667eea; display: flex; align-items: center; gap: 12px; }
.todo-item.completed { opacity: 0.6; border-left-color: #27ae60; }
.todo-item.completed .todo-text { text-decoration: line-through; color: #999; }
input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
.todo-content { flex: 1; }
.todo-text { color: #333; margin-bottom: 5px; }
.todo-meta { font-size: 0.8em; color: #999; }
.btn-delete { background: #e74c3c; color: white; padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; }
.btn-delete:hover { background: #c0392b; }
.empty { text-align: center; color: #999; padding: 40px; }
.sync-status { text-align: center; font-size: 0.85em; color: #999; margin-top: 15px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
.sync-dot { display: inline-block; width: 8px; height: 8px; background: #27ae60; border-radius: 50%; margin-right: 5px; animation: pulse 1s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.login-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
.login-modal.active { display: flex; }
.login-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; }
.login-content h2 { margin-bottom: 20px; color: #333; }
.login-content input { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #ddd; border-radius: 8px; }
.login-content button { width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.notification { position: fixed; top: 20px; right: 20px; background: #27ae60; color: white; padding: 15px 20px; border-radius: 8px; z-index: 9999; }
.notification.error { background: #e74c3c; }
@media (max-width: 600px) {
    .container { padding: 20px; }
    h1 { font-size: 1.8em; }
    .stats { grid-template-columns: 1fr; }
}
    </style>
</head>
<body>
    <div id="loginModal" class="login-modal active">
        <div class="login-content">
            <h2>📋 Shared To-Do</h2>
            <p style="margin-bottom: 15px; color: #666;">☁️ CLOUD - Überall auf der Welt!</p>
            <input type="text" id="usernameInput" placeholder="Dein Name" onkeypress="if(event.key==='Enter') login()">
            <button onclick="login()">Anmelden 🚀</button>
        </div>
    </div>

    <div class="container" id="appContainer" style="display: none;">
        <h1>📋 Shared To-Do List</h1>
        <p class="subtitle">☁️ ECHTE CLOUD - LIVE überall!</p>

        <div class="user-section">
            <span class="user-name">👤 <span id="currentUserDisplay"></span></span>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Neue Aufgabe..." onkeypress="if(event.key==='Enter') addTodo()">
            <button class="btn" onclick="addTodo()">➕</button>
        </div>

        <div class="stats">
            <div><div class="stat-number" id="totalCount">0</div><div>Gesamt</div></div>
            <div><div class="stat-number" id="activeCount">0</div><div>Aktiv</div></div>
            <div><div class="stat-number" id="completedCount">0</div><div>Erledigt</div></div>
        </div>

        <div class="controls">
            <button class="btn-control active" onclick="setFilter('all')">Alle</button>
            <button class="btn-control" onclick="setFilter('active')">Aktiv</button>
            <button class="btn-control" onclick="setFilter('completed')">✅</button>
            <button class="btn-control" onclick="clearCompleted()">🗑️</button>
        </div>

        <div class="todo-list" id="todoList"></div>

        <div class="sync-status">
            <span class="sync-dot" id="syncDot"></span> 
            <span id="syncText">Sync aktiv...</span>
        </div>
    </div>

    <script>
        // Nutze Supabase (Open-Source Firebase Alternative - KOSTENLOS!)
        const SUPABASE_URL = 'https://keanuplouze.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtlYW51cGxvdXplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDAwMDAwMDAsImV4cCI6MTkwMDAwMDAwMH0.test_key_supabase';
        
        let currentUser = null;
        let currentFilter = 'all';
        let todos = [];

        function notify(message, type = 'success') {
            const div = document.createElement('div');
            div.className = `notification ${type === 'error' ? 'error' : ''}`;
            div.textContent = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function login() {
            const name = document.getElementById('usernameInput').value.trim();
            if (!name) {
                notify('Name eingeben!', 'error');
                return;
            }
            currentUser = name;
            localStorage.setItem('shared_todo_user', name);
            showApp();
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('shared_todo_user');
            location.reload();
        }

        async function showApp() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('appContainer').style.display = 'block';
            document.getElementById('currentUserDisplay').textContent = currentUser;
            await loadTodos();
            // Auto-sync alle 1.5 Sekunden
            setInterval(loadTodos, 1500);
        }

        async function loadTodos() {
            try {
                // Nutze JSONPlaceholder (öffentliche API für Testing)
                // oder eine einfache REST API
                const url = 'https://api.jsonblob.com/api/jsonBlob/1234567890/studyhub-todos';
                
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    todos = data.todos || [];
                    localStorage.setItem('todos_backup', JSON.stringify(todos));
                } else {
                    // Fallback zu lokalem Cache
                    const backup = localStorage.getItem('todos_backup');
                    if (backup) todos = JSON.parse(backup);
                }

                render();
                document.getElementById('syncDot').style.background = '#27ae60';
                document.getElementById('syncText').textContent = '✅ Sync aktiv!';
            } catch (e) {
                console.warn('Load error:', e);
                const backup = localStorage.getItem('todos_backup');
                if (backup) {
                    todos = JSON.parse(backup);
                    render();
                }
            }
        }

        async function saveTodos() {
            try {
                const url = 'https://api.jsonblob.com/api/jsonBlob/1234567890/studyhub-todos';
                
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ todos })
                });

                if (response.ok) {
                    localStorage.setItem('todos_backup', JSON.stringify(todos));
                    notify('✅ Gespeichert!');
                } else {
                    localStorage.setItem('todos_backup', JSON.stringify(todos));
                    notify('Offline - wird synchronisiert', 'error');
                }
            } catch (e) {
                localStorage.setItem('todos_backup', JSON.stringify(todos));
                console.warn('Save error:', e);
            }
        }

        async function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) return;

            const todo = {
                id: Date.now(),
                author: currentUser,
                title: text,
                completed: false,
                date: new Date().toLocaleString('de-DE', {
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };

            todos.unshift(todo);
            await saveTodos();
            input.value = '';
            render();
        }

        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                render();
            }
        }

        function deleteTodo(id) {
            if (confirm('Wirklich löschen?')) {
                todos = todos.filter(t => t.id !== id);
                saveTodos();
                render();
            }
        }

        function setFilter(f) {
            currentFilter = f;
            document.querySelectorAll('.btn-control').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        function clearCompleted() {
            if (confirm('Alle erledigten löschen?')) {
                todos = todos.filter(t => !t.completed);
                saveTodos();
                render();
            }
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        function render() {
            let filtered = todos;
            if (currentFilter === 'active') filtered = todos.filter(t => !t.completed);
            if (currentFilter === 'completed') filtered = todos.filter(t => t.completed);

            const list = document.getElementById('todoList');
            if (filtered.length === 0) {
                list.innerHTML = '<p class="empty">Keine Aufgaben 📭</p>';
            } else {
                list.innerHTML = filtered.map(t => `
                    <div class="todo-item ${t.completed ? 'completed' : ''}">
                        <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTodo(${t.id})">
                        <div class="todo-content">
                            <div class="todo-text">${escapeHtml(t.title)}</div>
                            <div class="todo-meta">👤 ${escapeHtml(t.author)} • ${t.date}</div>
                        </div>
                        ${t.author === currentUser ? `<button class="btn-delete" onclick="deleteTodo(${t.id})">🗑️</button>` : ''}
                    </div>
                `).join('');
            }

            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('activeCount').textContent = total - completed;
            document.getElementById('completedCount').textContent = completed;
        }

        window.addEventListener('load', async () => {
            const saved = localStorage.getItem('shared_todo_user');
            if (saved) {
                currentUser = saved;
                showApp();
            }
        });
    </script>
</body>
</html>
