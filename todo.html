<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
    <title>📋 To-Do List</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    border-radius: 15px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    max-width: 500px;
    width: 100%;
    padding: 30px;
}

h1 {
    color: #333;
    text-align: center;
    margin-bottom: 30px;
    font-size: 2.5em;
}

.input-group {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
}

input[type="text"] {
    flex: 1;
    padding: 12px 15px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 1em;
    transition: 0.3s;
}

input[type="text"]:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
}

.btn-add {
    padding: 12px 25px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    font-size: 1em;
    transition: 0.3s;
}

.btn-add:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

.btn-add:active {
    transform: translateY(0);
}

.stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
    background: #f9f9f9;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.stat {
    font-size: 0.9em;
    color: #666;
}

.stat-number {
    font-size: 1.8em;
    font-weight: bold;
    color: #667eea;
}

.todo-list {
    max-height: 500px;
    overflow-y: auto;
}

.todo-item {
    background: #f9f9f9;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s;
    border-left: 4px solid #667eea;
}

.todo-item:hover {
    background: #f0f0f0;
    transform: translateX(5px);
}

.todo-item.completed {
    opacity: 0.6;
    border-left: 4px solid #27ae60;
}

.todo-item.completed .todo-text {
    text-decoration: line-through;
    color: #999;
}

input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    accent-color: #667eea;
}

.todo-text {
    flex: 1;
    color: #333;
    font-size: 1em;
    word-break: break-word;
}

.todo-date {
    font-size: 0.75em;
    color: #999;
}

.btn-delete {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 0.85em;
    transition: 0.3s;
}

.btn-delete:hover {
    background: #c0392b;
}

.controls {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    flex-wrap: wrap;
}

.btn-control {
    flex: 1;
    min-width: 100px;
    padding: 10px;
    border: 2px solid #ddd;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.btn-control:hover {
    border-color: #667eea;
    color: #667eea;
}

.btn-control.active {
    background: #667eea;
    color: white;
    border-color: #667eea;
}

.empty-state {
    text-align: center;
    color: #999;
    padding: 40px 20px;
}

.empty-state-icon {
    font-size: 3em;
    margin-bottom: 10px;
}

@media (max-width: 500px) {
    .container { padding: 20px; }
    h1 { font-size: 2em; }
    .input-group { flex-direction: column; }
    .btn-add { width: 100%; }
}

::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb {
    background: #667eea;
    border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
    background: #764ba2;
}
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 To-Do List</h1>
        
        <div class="input-group">
            <input type="text" id="todoInput" placeholder="Was willst du erledigen?" onkeypress="if(event.key==='Enter') addTodo()">
            <button class="btn-add" onclick="addTodo()">➕ Hinzufügen</button>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalCount">0</div>
                <div>Gesamt</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="completedCount">0</div>
                <div>Erledigt</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-control active" onclick="filterTodos('all')" id="filterAll">Alle</button>
            <button class="btn-control" onclick="filterTodos('active')" id="filterActive">Aktiv</button>
            <button class="btn-control" onclick="filterTodos('completed')" id="filterCompleted">Erledigt</button>
            <button class="btn-control" onclick="clearCompleted()" id="clearBtn">🗑️ Leeren</button>
        </div>

        <div class="todo-list" id="todoList"></div>
    </div>

    <script>
        let todos = [];
        let currentFilter = 'all';

        // Daten laden
        function loadTodos() {
            const saved = localStorage.getItem('todos_app');
            if (saved) {
                todos = JSON.parse(saved);
            }
            renderTodos();
            updateStats();
        }

        // Daten speichern
        function saveTodos() {
            localStorage.setItem('todos_app', JSON.stringify(todos));
        }

        // To-Do hinzufügen
        function addTodo() {
            const input = document.getElementById('todoInput');
            const text = input.value.trim();

            if (!text) {
                alert('❌ Bitte gib eine Aufgabe ein!');
                return;
            }

            const todo = {
                id: Date.now(),
                text: text,
                completed: false,
                date: new Date().toLocaleString('de-DE', { 
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };

            todos.unshift(todo);
            saveTodos();
            input.value = '';
            renderTodos();
            updateStats();
        }

        // To-Do löschen
        function deleteTodo(id) {
            if (confirm('Wirklich löschen?')) {
                todos = todos.filter(t => t.id !== id);
                saveTodos();
                renderTodos();
                updateStats();
            }
        }

        // To-Do als erledigt markieren
        function toggleTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.completed = !todo.completed;
                saveTodos();
                renderTodos();
                updateStats();
            }
        }

        // To-Dos filtern
        function filterTodos(filter) {
            currentFilter = filter;
            
            // Filter Buttons aktualisieren
            document.querySelectorAll('.btn-control:not(#clearBtn)').forEach(btn => {
                btn.classList.remove('active');
            });
            
            if (filter === 'all') document.getElementById('filterAll').classList.add('active');
            if (filter === 'active') document.getElementById('filterActive').classList.add('active');
            if (filter === 'completed') document.getElementById('filterCompleted').classList.add('active');
            
            renderTodos();
        }

        // Erledigte To-Dos löschen
        function clearCompleted() {
            if (confirm('Alle erledigten Aufgaben löschen?')) {
                todos = todos.filter(t => !t.completed);
                saveTodos();
                renderTodos();
                updateStats();
            }
        }

        // To-Dos anzeigen
        function renderTodos() {
            const list = document.getElementById('todoList');
            
            let filtered = todos;
            
            if (currentFilter === 'active') {
                filtered = todos.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filtered = todos.filter(t => t.completed);
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            ${currentFilter === 'completed' ? '✨' : currentFilter === 'active' ? '📝' : '📭'}
                        </div>
                        <p>${
                            currentFilter === 'completed' ? 'Noch keine erledigten Aufgaben!' :
                            currentFilter === 'active' ? 'Keine aktiven Aufgaben! 🎉' :
                            'Keine Aufgaben erstellt. Füge eine hinzu!'
                        }</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${todo.id})">
                    <div style="flex: 1;">
                        <div class="todo-text">${escapeHtml(todo.text)}</div>
                        <div class="todo-date">📅 ${todo.date}</div>
                    </div>
                    <button class="btn-delete" onclick="deleteTodo(${todo.id})">🗑️</button>
                </div>
            `).join('');
        }

        // Stats aktualisieren
        function updateStats() {
            const total = todos.length;
            const completed = todos.filter(t => t.completed).length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('completedCount').textContent = completed;
        }

        // HTML escapen (Sicherheit)
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Beim Laden
        window.addEventListener('load', loadTodos);
    </script>
</body>
</html>
